<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quest Notes</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="logo-mark">QN</span>
          <div>
            <p class="eyebrow">Quest Notes</p>
            <h1>Nhiệm vụ, xu và flashcard</h1>
          </div>
        </div>

        <div class="coin-panel">
          <span>Số xu</span>
          <strong id="coinCount">0</strong>
        </div>

        <nav class="tabs" aria-label="Quest Notes sections">
          <button class="tab active" data-view="tasks" type="button">Nhiệm vụ</button>
          <button class="tab" data-view="shop" type="button">Cửa hàng</button>
          <button class="tab" data-view="flashcards" type="button">Flashcards</button>
        </nav>

        <div class="sync-line">
          <span id="syncDot" class="sync-dot"></span>
          <span id="syncText">Đang kết nối...</span>
        </div>
      </aside>

      <main class="workspace">
        <section id="tasksView" class="view active">
          <header class="quest-header">
            <button id="prevDate" class="icon-button" type="button" aria-label="Ngày trước">&lt;</button>
            <div class="date-block">
              <p id="weekdayLabel" class="eyebrow">Hôm nay</p>
              <input id="taskDate" type="date" />
            </div>
            <button id="nextDate" class="icon-button" type="button" aria-label="Ngày sau">&gt;</button>
            <div class="quest-progress">
              <div class="progress-bar"><span id="taskProgressBar"></span></div>
              <p id="taskProgressText">Hoàn thành 0/0 nhiệm vụ</p>
            </div>
          </header>

          <form id="taskForm" class="control-panel task-form">
            <input id="taskTitle" placeholder="Thêm nhiệm vụ" autocomplete="off" />
            <input id="taskReward" type="number" min="1" value="20" aria-label="Reward" />
            <button type="submit">Thêm</button>
          </form>

          <div id="taskList" class="list"></div>
        </section>

        <section id="shopView" class="view">
          <header class="section-head">
            <div>
              <p class="eyebrow">Phần thưởng</p>
              <h2>Cửa hàng phần thưởng</h2>
            </div>
          </header>

          <form id="shopForm" class="control-panel shop-form">
            <input id="shopName" placeholder="Tên vật phẩm" autocomplete="off" />
            <input id="shopPrice" type="number" min="1" value="50" aria-label="Price" />
            <input id="shopNote" placeholder="Ghi chú" autocomplete="off" />
            <button id="shopSubmit" type="submit">Lưu</button>
            <button id="shopCancel" class="ghost hidden" type="button">Hủy</button>
          </form>

          <div id="shopList" class="list"></div>
        </section>

        <section id="flashcardsView" class="view">
          <header class="section-head">
            <div>
              <p class="eyebrow">Bộ học</p>
              <h2>Flashcards</h2>
            </div>
          </header>

          <div class="flash-layout">
            <section class="deck-panel">
              <form id="deckForm" class="control-panel deck-form">
                <input id="deckName" placeholder="Tên bộ flashcard" autocomplete="off" />
                <button type="submit">Thêm bộ</button>
              </form>
              <div id="deckList" class="deck-strip"></div>
            </section>

            <section class="study-panel">
              <div class="study-top">
                <div>
                  <p class="eyebrow">Đang học</p>
                  <h3 id="activeDeckName">Từ vựng chung</h3>
                </div>
                <div class="deck-actions">
                  <button id="swapDeckSides" class="ghost" type="button">Đảo cả bộ</button>
                  <button id="claimDeckReward" class="gold-button" type="button">Nhận xu</button>
                </div>
              </div>

              <div class="reward-panel">
                <div>
                  <strong id="deckProgressText">Tiến độ 0/0 thẻ</strong>
                  <span id="deckRewardText">Hoàn thành bộ để nhận xu</span>
                </div>
                <div class="progress-bar"><span id="deckProgressBar"></span></div>
              </div>

              <div id="flashCard" class="flash-card" role="button" tabindex="0" aria-label="Lật flashcard">
                <div class="flash-card-inner">
                  <div class="flash-face flash-front">
                    <span class="face-label">Mặt trước</span>
                    <div id="flashFront" class="flash-content">Chưa có thẻ</div>
                  </div>
                  <div class="flash-face flash-back">
                    <span class="face-label">Mặt sau</span>
                    <div id="flashBack" class="flash-content">Hãy thêm từ vựng</div>
                    <button id="toggleMeaning" class="ghost hidden" type="button">Bật nghĩa</button>
                    <div id="flashMeaning" class="flash-meaning hidden"></div>
                  </div>
                </div>
              </div>

              <div class="study-actions">
                <div class="study-nav">
                  <button id="prevCard" class="icon-button" type="button" aria-label="Thẻ trước">&lt;</button>
                  <span id="cardCounter">0/0</span>
                  <button id="nextCard" class="icon-button" type="button" aria-label="Thẻ sau">&gt;</button>
                </div>
                <div class="card-actions">
                  <button id="toggleMastered" class="ghost" type="button">Đã thuộc</button>
                  <button id="swapCardSides" class="ghost" type="button">Đảo mặt</button>
                  <button id="deleteCard" class="danger" type="button">Xóa thẻ</button>
                </div>
              </div>

              <div class="import-toolbar">
                <button id="toggleImportMenu" type="button" aria-expanded="false">Nhập từ vựng</button>
              </div>

              <div id="importMenu" class="import-menu hidden">
                <form id="bulkCardForm" class="control-panel bulk-form">
                  <textarea id="bulkCards" placeholder="Mỗi dòng một từ tiếng Anh&#10;hello&#10;work&#10;study"></textarea>
                  <button type="submit">Dịch & thêm nhiều từ</button>
                </form>
                <div class="import-side">
                  <form id="cardForm" class="control-panel card-form">
                    <input id="cardFront" placeholder="Tiếng Anh" autocomplete="off" />
                    <button id="translateCard" class="ghost" type="button">Dịch sang tiếng Trung</button>
                    <input id="cardFrontPhonetic" placeholder="Phiên âm tiếng Anh" autocomplete="off" readonly />
                    <input id="cardBack" placeholder="Tiếng Trung" autocomplete="off" readonly />
                    <input id="cardBackPhonetic" placeholder="Phiên âm tiếng Trung" autocomplete="off" readonly />
                    <input id="cardMeaning" placeholder="Nghĩa tiếng Việt" autocomplete="off" readonly />
                    <button type="submit">Thêm thẻ</button>
                  </form>
                  <label class="excel-upload">
                    <input id="excelInput" type="file" accept=".xlsx,.xls" />
                    <span>Nhập Excel</span>
                  </label>
                </div>
              </div>

              <div id="cardList" class="mini-list"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="coinBurst" class="coin-burst" aria-hidden="true"></div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
